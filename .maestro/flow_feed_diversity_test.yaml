appId: com.mitreels.app
---
# Test: Feed diversity — swipe through 10 reels, verify varied content
# Screenshots should show different courses/sources, not dominated by one.

- launchApp:
    clearState: true

# Wait for initial feed to load (seed data + YouTube embed)
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: diversity_reel_1

# Swipe through 9 more reels
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: diversity_reel_2

